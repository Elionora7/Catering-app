version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: catering-app-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: P@ssw0rd
      POSTGRES_DB: catering_app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Uncomment below to run Next.js in Docker
  # nextjs:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: catering-app-nextjs
  #   restart: unless-stopped
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - DATABASE_URL=postgresql://user:password@postgres:5432/catering_app?schema=public
  #     - NEXTAUTH_URL=http://localhost:3000
  #     - NEXTAUTH_SECRET=your-secret-key-here
  #   depends_on:
  #     postgres:
  #       condition: service_healthy

volumes:
  postgres_data:

